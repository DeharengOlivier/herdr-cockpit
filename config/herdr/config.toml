# herdr-cockpit: Herdr configuration.
#
# install.sh replaces @@COCKPIT_PANEL@@ with the real path of the panel before
# writing this file to ~/.config/herdr/config.toml.
#
# This file deliberately covers only a small subset of the options.
# The full reference for your version:   herdr --default-config
# Validate after editing:                herdr config check
# Reload without restarting:             herdr server reload-config

[ui]
# The agent name is displayed on the border of its pane: useful as soon as
# several agents are running side by side.
show_agent_labels_on_pane_borders = true
# Agents asking for your attention move up to the top of the column.
agent_panel_sort = "priority"

# DO NOT enable hide_tab_bar_when_single_tab here.
#
# It would make the tab bar and its "+" button disappear from the statistics
# space, which would be desirable, but it is global: the project spaces would
# lose their bar too as long as they only have a single tab.
#
# Herdr 0.7 cannot target a single space. The condition is hardcoded in
# src/ui.rs: `app.hide_tab_bar_when_single_tab && ws.tabs.len() == 1`, where
# only the tab count depends on the space, never its identity. There is no
# per-workspace config section, no per-directory file, and the report-metadata
# tokens only reach the sidebar.
#
# The "+" therefore stays visible on the statistics space. It is harmless: the
# bootstrap.sh watcher closes any tab that gets created within two seconds.

[theme]
name = "catppuccin"
# Switch to true to follow the light/dark appearance of the host terminal.
# Then fill in dark_name and light_name (e.g. "catppuccin" / "catppuccin-latte").
auto_switch = false

[session]
# Resumes the agents' conversations in their native session after a restart of
# the Herdr server. Without this option, the server restores the layout of the
# spaces but the agents start over from scratch.
#
# Requires the official integrations, which alone report the session
# references:   herdr integration install claude
#               herdr integration status
resume_agents_on_restore = true

[keys]
# Closing a space is disabled: this shortcut (Ctrl-b Shift+D) is what was
# deleting the statistics space by accident. Tabs and panes remain closable as
# usual, only the spaces are protected.
#
# This does not cover the "close" entry of the sidebar menu: no Herdr 0.7
# option makes it possible to hide it. It is the watcher started by
# bootstrap.sh that catches this case, recreating the space within two seconds.
close_workspace = ""

# Ctrl-b then i: agent consumption panel (tokens, cost, quotas) as an overlay.
# The same panel lives permanently in the "▦ Stats" space of the left column.
[[keys.command]]
key = "prefix+i"
type = "popup"
command = "python3 '@@COCKPIT_PANEL@@'"
width = "88%"
height = "80%"
