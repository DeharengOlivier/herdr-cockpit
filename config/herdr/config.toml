# herdr-cockpit : configuration Herdr.
#
# install.sh remplace @@COCKPIT_PANEL@@ par le chemin reel du panneau avant
# d'ecrire ce fichier dans ~/.config/herdr/config.toml.
#
# Ce fichier ne couvre volontairement qu'une petite partie des options.
# La reference complete de votre version :   herdr --default-config
# Valider apres edition :                    herdr config check
# Recharger sans redemarrer :                herdr server reload-config

[ui]
# Le nom de l'agent s'affiche sur la bordure de sa pane : utile des que
# plusieurs agents tournent cote a cote.
show_agent_labels_on_pane_borders = true
# Les agents qui reclament votre attention remontent en haut de la colonne.
agent_panel_sort = "priority"

# NE PAS activer hide_tab_bar_when_single_tab ici.
#
# Il ferait disparaitre la barre d'onglets et son bouton "+" du space de
# statistiques, ce qui serait souhaitable, mais il est global : les spaces
# projets perdraient aussi leur barre tant qu'ils n'ont qu'un onglet.
#
# Herdr 0.7 ne sait pas cibler un seul space. La condition est ecrite en dur
# dans src/ui.rs : `app.hide_tab_bar_when_single_tab && ws.tabs.len() == 1`,
# ou seul le nombre d'onglets depend du space, jamais son identite. Il n'y a
# ni section de config par workspace, ni fichier par repertoire, et les tokens
# de report-metadata n'atteignent que la barre laterale.
#
# Le "+" reste donc visible sur le space de statistiques. Il est inoffensif :
# la surveillance de bootstrap.sh referme en deux secondes tout onglet cree.

[theme]
name = "catppuccin"
# Passer a true pour suivre l'apparence claire/sombre du terminal hote.
# Renseigner alors dark_name et light_name (ex. "catppuccin" / "catppuccin-latte").
auto_switch = false

[session]
# Reprend les conversations des agents dans leur session native apres un
# redemarrage du serveur Herdr. Sans cette option, le serveur restaure la
# disposition des spaces mais les agents repartent de zero.
#
# Requiert les integrations officielles, qui seules remontent les references de
# session :   herdr integration install claude
#             herdr integration status
resume_agents_on_restore = true

[keys]
# Fermeture d'un space desactivee : c'est ce raccourci (Ctrl-b Shift+D) qui
# supprimait le space de statistiques par accident. Les onglets et les panes
# restent fermables normalement, seuls les spaces sont proteges.
#
# Cela ne couvre pas l'entree "close" du menu de la barre laterale : aucune
# option de Herdr 0.7 ne permet de la masquer. C'est la surveillance lancee
# par bootstrap.sh qui rattrape ce cas, en recreant le space en deux secondes.
close_workspace = ""

# Ctrl-b puis i : panneau de consommation des agents (tokens, cout, quotas)
# en surimpression. Le meme panneau vit en permanence dans le space "▦ Stats"
# de la colonne de gauche.
[[keys.command]]
key = "prefix+i"
type = "popup"
command = "python3 '@@COCKPIT_PANEL@@'"
width = "88%"
height = "80%"
